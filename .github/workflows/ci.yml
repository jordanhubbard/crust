name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Ratcheted upward only — never lowered. Local default is 100 (see
  # docs/testing.md); this CI value is the strict-floor for PRs while the
  # legacy suite is expanded. Last bump: 21 → 50 (crust-d39, 2026-05-04)
  # following lib-level test additions in codegen/contracts/proofgen/types/
  # strictness/value modules. Current measured: regions 52.70%, lines 55.08%,
  # functions 74.63%.
  CRUST_COVERAGE_MIN: "50"

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --all-targets

      - name: Install Coverage Tool
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage
        run: ./scripts/coverage.sh
